name: Build CI

on:
  push:
    branches: [ "master" ]
    paths: &paths
      - "meson.build"
      - "meson.options"
      - "meson_options.txt"
      - "include/**"
      - "src/**"
      - "man/**"
      - ".github/**"

  pull_request:
    branches: [ "master" ]
    paths: *paths

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - name: glibc
            container: ""
            install: |
              sudo apt-get update
              sudo apt-get install -y \
                meson ninja-build pkg-config g++ \
                scdoc libelf-dev
          - name: musl
            container: "alpine:latest"
            install: |
              apk add --no-cache \
                build-base meson ninja pkgconf \
                scdoc elfutils-dev
        cfg:
          - name: default
            build_man: true

  name: ${{ matrix.env.name }} / ${{ matrix.cfg.name }}
  container: ${{ matrix.env.container != '' && matrix.env.container || null }}

  steps:
    - uses: actions/checkout@v5

    - name: Install build dependencies
      run: ${{ matrix.env.install }}

    - name: Configure
      run: |
        meson setup build \
          --buildtype=plain \
          --wrap-mode=nodownload \
          -D b_lto=false \
          -D b_pie=true \
          -D build_man=${{ matrix.cfg.build_man }}

    - name: Compile
      run: meson compile -C build -v

    - name: Install to staging
      run: |
        DESTDIR="$PWD/stage" meson install -C build

